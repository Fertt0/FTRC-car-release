name: 'Create Release with Version Update'
description: 'Updates version in JSON, creates tag, and publishes GitHub Release with ZIP'
branding:
  icon: 'package'
  color: 'blue'

inputs:
  version:
    description: 'Version number (without v prefix)'
    required: true
  token:
    description: 'GitHub token for authentication (use github.token or PAT)'
    required: false
    default: ${{ github.token }}
  json_file:
    description: 'Path to JSON file to update'
    required: false
    default: 'ui/ui_car.json'
  json_field:
    description: 'Field name in JSON to update with version'
    required: false
    default: 'version'
  archive_name:
    description: 'Base name for ZIP archive'
    required: false
    default: ''
  exclude_patterns:
    description: 'Space-separated patterns to exclude from ZIP'
    required: false
    default: '.git/* .github/* .gitattributes .gitignore'
  enable_lfs:
    description: 'Whether to pull Git LFS files'
    required: false
    default: 'true'
  commit_message:
    description: 'Commit message template (use {TAG} placeholder)'
    required: false
    default: 'Release {TAG}'
  tag_prefix:
    description: 'Prefix for git tag'
    required: false
    default: 'v'

runs:
  using: 'composite'
  steps:
    - name: Checkout with LFS
      if: inputs.enable_lfs == 'true'
      uses: actions/checkout@v4
      with:
        lfs: true
        fetch-depth: 0
        token: ${{ inputs.token }}

    - name: Checkout without LFS
      if: inputs.enable_lfs != 'true'
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ inputs.token }}

    - name: Pull LFS files
      if: inputs.enable_lfs == 'true'
      shell: bash
      run: git lfs pull

    - name: Set version variables
      shell: bash
      run: |
        VERSION="${{ inputs.version }}"
        TAG="${{ inputs.tag_prefix }}$VERSION"
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        echo "TAG=$TAG" >> $GITHUB_ENV
        echo "✅ Version: $VERSION | Tag: $TAG"

    - name: Update version in JSON
      shell: bash
      run: |
        if [ ! -f "${{ inputs.json_file }}" ]; then
          echo "::warning::File ${{ inputs.json_file }} not found, skipping version update"
          exit 0
        fi
        jq --arg version "$VERSION" '.${{ inputs.json_field }}=$version' "${{ inputs.json_file }}" > tmp.json
        mv tmp.json "${{ inputs.json_file }}"
        echo "✅ Updated ${{ inputs.json_field }} to $VERSION in ${{ inputs.json_file }}"

    - name: Commit version change
      shell: bash
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git add "${{ inputs.json_file }}"
        COMMIT_MSG="${{ inputs.commit_message }}"
        COMMIT_MSG="${COMMIT_MSG//\{TAG\}/$TAG}"
        git commit -m "$COMMIT_MSG" || echo "ℹ️ No changes to commit"

    - name: Configure git for authenticated push
      shell: bash
      run: |
        # Replace origin URL to use token for authentication
        REPO_URL="https://x-access-token:${{ inputs.token }}@github.com/${{ github.repository }}.git"
        git remote set-url origin "$REPO_URL"

    - name: Push commit
      shell: bash
      run: git push origin HEAD

    - name: Create and push tag
      shell: bash
      run: |
        git tag "$TAG"
        git push origin "$TAG"
        echo "✅ Tag $TAG created and pushed"

    - name: Set archive filename
      shell: bash
      run: |
        if [ -n "${{ inputs.archive_name }}" ]; then
          FILENAME="${{ inputs.archive_name }}"
        else
          FILENAME=${{ github.repository }}
          FILENAME=${FILENAME#*/}
        fi
        echo "FILENAME=$FILENAME" >> $GITHUB_ENV
        echo "✅ Archive name: $FILENAME"

    - name: Create ZIP archive
      shell: bash
      run: |
        EXCLUDE_ARGS=""
        for pattern in ${{ inputs.exclude_patterns }}; do
          EXCLUDE_ARGS="$EXCLUDE_ARGS -x \"$pattern\""
        done
        eval "zip -r ${FILENAME}_${VERSION}.zip . $EXCLUDE_ARGS"
        echo "✅ Created archive: ${FILENAME}_${VERSION}.zip"

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ env.TAG }}
        files: ${{ env.FILENAME }}_${{ env.VERSION }}.zip
      env:
        GITHUB_TOKEN: ${{ inputs.token }}